<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist do Flat</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div class="container">

<header>
<img src="logo.png" class="logo">
<h1>Checklist de Itens do Flat</h1>
</header>

<form id="checklistForm">

<div class="section">

<h2>Informações do Hóspede</h2>

<label>Nome</label>
<input type="text" required>

<label>CPF</label>
<input type="text" required>

<label>WhatsApp</label>
<input type="tel" required>

<label>Número do Flat</label>
<input type="number" required>

</div>

<div class="section">

<h2>Banheiro</h2>

<label class="check">
<input type="checkbox">
Toalha de rosto
</label>

<label class="check">
<input type="checkbox">
Toalha de piso
</label>

<div class="row">

<label class="check">
<input type="checkbox">
Toalha de banho
</label>

<select>
<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

</div>

</div>

<div class="section">

<h2>Quarto</h2>

<label class="check">
<input type="checkbox">
Lençóis
</label>

</div>

<div class="section">

<h2>Cozinha</h2>

<label class="check">
<input type="checkbox">
Utensílios de cozinha
</label>

<label class="check">
<input type="checkbox">
Liquidificador
</label>

<label class="check">
<input type="checkbox">
Torradeira
</label>

</div>

<div class="section">

<h2>Diversos</h2>

<label class="check">
<input type="checkbox">
Controle da televisão
</label>

<label class="check">
<input type="checkbox">
Controle do ar-condicionado
</label>

</div>

<div class="section">

<h2>Assinatura</h2>

<canvas id="signaturePad"></canvas>

<div class="signatureButtons">
<button type="button" onclick="clearSignature()">Limpar Assinatura</button>
</div>

</div>

<button type="submit" class="submitBtn">
Enviar Checklist
</button>

</form>

</div>

</body>
</html>
