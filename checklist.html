<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family: Arial;
padding:20px;
max-width:500px;
margin:auto;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

canvas{
border:1px solid #000;
width:100%;
height:200px;
}

button{
padding:12px;
font-size:16px;
width:100%;
background:#25D366;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h2>Checklist</h2>

<label>Nome</label>
<input id="nome">

<label>WhatsApp</label>
<input id="telefone" placeholder="5511999999999">

<label>Observações</label>
<textarea id="obs"></textarea>

<label>Checklist</label>

<input type="checkbox" id="item1"> Item 1 OK<br>
<input type="checkbox" id="item2"> Item 2 OK<br>
<input type="checkbox" id="item3"> Item 3 OK<br><br>

<label>Assinatura</label>

<canvas id="signature"></canvas>
<br>
<button onclick="clearSignature()">Limpar assinatura</button>
<br><br>

<button onclick="enviar()">Enviar</button>

<script>

const canvas = document.getElementById("signature");
const signaturePad = new SignaturePad(canvas);

function clearSignature(){
signaturePad.clear();
}

async function enviar(){

const nome = document.getElementById("nome").value;
const telefone = document.getElementById("telefone").value;
const obs = document.getElementById("obs").value;

const item1 = document.getElementById("item1").checked ? "OK" : "NOK";
const item2 = document.getElementById("item2").checked ? "OK" : "NOK";
const item3 = document.getElementById("item3").checked ? "OK" : "NOK";

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.text("CHECKLIST",20,20);

doc.text("Nome: "+nome,20,40);
doc.text("Telefone: "+telefone,20,50);

doc.text("Item1: "+item1,20,70);
doc.text("Item2: "+item2,20,80);
doc.text("Item3: "+item3,20,90);

doc.text("Observações:",20,110);
doc.text(obs,20,120);

const assinatura = signaturePad.toDataURL();

doc.addImage(assinatura,"PNG",20,140,100,40);

const pdfBlob = doc.output("blob");

const file = new File([pdfBlob], "checklist.pdf", {type:"application/pdf"});

if (navigator.share) {

await navigator.share({
title: "Checklist",
files: [file]
});

} else {

doc.save("checklist.pdf");

alert("PDF gerado. Envie pelo WhatsApp.");

}

}

</script>

</body>
</html>
